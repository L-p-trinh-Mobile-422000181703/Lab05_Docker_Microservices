server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: register-service
          uri: ${REGISTER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/register, /api/users/**

        - id: login-service
          uri: ${LOGIN_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/login
