# ============================================================
# Docker Compose - Part 3: Online Food Delivery Microservices
#
# Services:
#   - MySQL          (port 3306)  : Database cho Register Service
#   - MongoDB        (port 27017) : Database cho Login Service
#   - Register Service (port 8081): User Registration + REST API
#   - Login Service    (port 8082): Authentication + JWT
#   - API Gateway      (port 8080): Spring Cloud Gateway
#
# Data Flow:
#   User -> API Gateway (8080) -> Register Service (8081) -> MySQL
#                               -> Login Service (8082)   -> MongoDB
#                                  Login Service --Feign--> Register Service
# ============================================================

services:

  # ==================== MySQL (Register Service DB) ====================
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: food_delivery
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - microservices

  # ==================== MongoDB (Login Service DB) ====================
  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - microservices

  # ==================== Register Service ====================
  register-service:
    build: ./register-service
    ports:
      - "8081:8081"
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: rootpassword
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - microservices

  # ==================== Login Service ====================
  login-service:
    build: ./login-service
    ports:
      - "8082:8082"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/food_delivery_auth
      REGISTER_SERVICE_URL: http://register-service:8081
    depends_on:
      mongodb:
        condition: service_healthy
      register-service:
        condition: service_started
    networks:
      - microservices

  # ==================== API Gateway ====================
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      REGISTER_SERVICE_URL: http://register-service:8081
      LOGIN_SERVICE_URL: http://login-service:8082
    depends_on:
      - register-service
      - login-service
    networks:
      - microservices

volumes:
  mysql_data:
  mongo_data:

networks:
  microservices:
    driver: bridge
